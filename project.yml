name: PledgeApp
options:
  bundleIdPrefix: com.pledge
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "Y8LCDK623F"
packages:
  Vortex:
    url: https://github.com/twostraws/Vortex
    from: "1.0.0"
targets:
  PledgeApp:
    type: application
    platform: iOS
    sources:
      - path: PledgeApp.swift
      - path: Core
      - path: Features
    dependencies:
      - package: Vortex
    entitlements:
      path: PledgeApp.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    settings:
      base:
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        INFOPLIST_GENERATION: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.navro.pledgeapp
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Pledge uses your health data to automatically verify habits like steps, sleep, and workouts."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Pledge records your habit completion to HealthKit."
        INFOPLIST_KEY_NSMotionUsageDescription: "Pledge uses motion data to verify step-based habits."
        INFOPLIST_KEY_NSCameraUsageDescription: "Pledge uses your camera to count exercise reps like pushups using body pose detection."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Pledge uses your location to verify habits like gym attendance and outdoor time."
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "Pledge monitors your location in the background to automatically verify location-based habits like gym visits."
        INFOPLIST_KEY_UIBackgroundModes: "location"
