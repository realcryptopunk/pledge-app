name: PledgeApp
options:
  bundleIdPrefix: com.pledge
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "Y8LCDK623F"
packages:
  Vortex:
    url: https://github.com/twostraws/Vortex
    from: "1.0.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  PrivySDK:
    url: https://github.com/privy-io/privy-ios
    from: "2.0.0"
targets:
  PledgeApp:
    type: application
    platform: iOS
    sources:
      - path: PledgeApp.swift
      - path: Core
      - path: Features
      - path: Assets.xcassets
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    dependencies:
      - package: Vortex
      - package: Supabase
        product: Supabase
      - package: PrivySDK
        product: Privy
    info:
      path: Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - location
        NSHealthShareUsageDescription: "Pledge uses your health data to automatically verify habits like steps, sleep, and workouts."
        NSHealthUpdateUsageDescription: "Pledge records your habit completion to HealthKit."
        NSMotionUsageDescription: "Pledge uses motion data to verify step-based habits."
        NSCameraUsageDescription: "Pledge uses your camera to count exercise reps like pushups using body pose detection."
        NSLocationWhenInUseUsageDescription: "Pledge uses your location to verify habits like gym attendance and outdoor time."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Pledge monitors your location in the background to automatically verify location-based habits like gym visits."
        PRIVY_APP_ID: $(PRIVY_APP_ID)
        PRIVY_APP_CLIENT_ID: $(PRIVY_APP_CLIENT_ID)
        COINBASE_ONRAMP_APP_ID: $(COINBASE_ONRAMP_APP_ID)
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        GEMINI_API_KEY: $(GEMINI_API_KEY)
    entitlements:
      path: PledgeApp.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.navro.pledgeapp
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
